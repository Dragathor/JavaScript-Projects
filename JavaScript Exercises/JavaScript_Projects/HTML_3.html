<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf8">
        <title>Java Script Projects</title>
        <link rel="stylesheet" type="text/css" href="./CSS/CSS_Java_1.css">
    </head>

    <body>
        <div>
            <h1>Classes</h1>
            <h3>Click to see what a class does!</h3>

            <ul>
                <li onclick="displayInfo(this)" id="Fighter" data-information-type="a front-line warrior that protects the rest of the party. Often wearing heavy armour and fighting with either a one-handed weapon and a large protective shield or two-handed weapon for massive damage.">Fighter</li>
                <li onclick="displayInfo(this)" id="Wizard" data-information-type="a master arcane bringing forth lightning and fire to smite his opponents. Also calling fourth monsters from beyond reality to do his bidding.">Wizard</li>
                <li onclick="displayInfo(this)" id="Cleric" data-information-type="the servant of a god. He wields his god's powers to bring about healing and absolution to his allies and wroth and destruction upon his enemies!">Cleric</li>
                <li onclick="displayInfo(this)" id="Thief" data-information-type="master of getting into places he isn't wanted, whether it's a locked chest in a lord's manor or an ancient trap in a forgotten tomb.">Thief</li>
            </ul>
        </div>

    <script src="./JavaScript/JavaScript_2.js"></script>
    </body>
</html>
